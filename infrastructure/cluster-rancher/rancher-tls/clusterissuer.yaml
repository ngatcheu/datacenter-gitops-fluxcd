---
# Issuer bootstrap self-signed pour générer la CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# CA auto-signée dans cattle-system — devient le secret tls-ca requis par Rancher (privateCA: true)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rancher-ca
  namespace: cattle-system
spec:
  isCA: true
  commonName: rancher-homelab-ca
  secretName: tls-ca
  duration: 87600h
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# Issuer namespace-scoped dans cattle-system pour signer les certificats Rancher
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: rancher-ca-issuer
  namespace: cattle-system
spec:
  ca:
    secretName: tls-ca
