---
# HelmChartConfig pour RKE2 CoreDNS
# Ajoute une entrée hosts pour résoudre rancher.homelab.local
# depuis les pods du cluster-payload
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-coredns
  namespace: kube-system
spec:
  valuesContent: |-
    servers:
    - zones:
      - zone: .
      port: 53
      plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 10s
      - name: ready
      - name: hosts
        configBlock: |-
          192.168.1.221 rancher.homelab.local
          fallthrough
      - name: kubernetes
        parameters: cluster.local in-addr.arpa ip6.arpa
        configBlock: |-
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
      - name: prometheus
        parameters: "0.0.0.0:9153"
      - name: forward
        parameters: ". /etc/resolv.conf"
      - name: cache
        parameters: "30"
      - name: loop
      - name: reload
      - name: loadbalance
