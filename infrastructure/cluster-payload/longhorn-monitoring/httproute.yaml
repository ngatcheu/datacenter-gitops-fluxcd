---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: traefik
      namespace: traefik
  hostnames:
    - longhorn.homelab.local
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80