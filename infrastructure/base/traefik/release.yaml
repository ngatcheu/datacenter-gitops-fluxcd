---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  releaseName: traefik
  timeout: 10m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  values:
    deployment:
      replicas: 2

    # Ingress désactivé, Gateway API activé
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true

    ingressClass:
      enabled: false

    # Le chart crée automatiquement GatewayClass et Gateway
    gatewayClass:
      enabled: true

    gateway:
      enabled: true
      listeners:
        web:
          port: 8000
          protocol: HTTP
          namespacePolicy:
            from: All
        websecure:
          port: 8443
          protocol: HTTPS
          namespacePolicy:
            from: All
          certificateRefs:
            - name: wildcard-tls
              namespace: traefik
          mode: Terminate

    ports:
      web:
        port: 8000
        exposedPort: 80
        expose:
          default: true
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        port: 8443
        exposedPort: 443
        expose:
          default: true

    service:
      type: LoadBalancer

    logs:
      general:
        level: INFO
      access:
        enabled: true

    metrics:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: false

    api:
      dashboard: true

    ingressRoute:
      dashboard:
        enabled: true
        matchRule: "Host(`traefik.homelab.local`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
        entryPoints:
          - websecure