---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default
spec:
  # Adapter si l'interface réseau des nœuds n'est pas eth0 (ex: ens18, ens192)
  interfaces:
    - eth0
  loadBalancerIPs: true
  externalIPs: true
  # Tous les nœuds (pas de worker dédié dans ce cluster)
  nodeSelector:
    matchLabels: {}