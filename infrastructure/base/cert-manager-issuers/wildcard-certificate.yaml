---
# Certificat wildcard pour *.homelab.local — émis dans le namespace traefik
# pour être référencé directement par le Gateway
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-homelab-tls
  namespace: traefik
spec:
  secretName: wildcard-tls
  duration: 8760h
  renewBefore: 720h
  subject:
    organizations:
      - Home Lab
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - "*.homelab.local"
    - "homelab.local"
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io