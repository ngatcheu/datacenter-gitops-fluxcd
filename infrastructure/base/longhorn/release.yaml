---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 1m
  timeout: 20m
  install:
    crds: CreateReplace
    timeout: 20m
  upgrade:
    crds: CreateReplace
    timeout: 20m
  values:
    networkPolicies:
      enabled: false
      type: "rke2"
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
    defaultSettings:
      defaultReplicaCount: 2
      storageOverProvisioningPercentage: 200
      storageMinimalAvailablePercentage: 10
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      defaultFsType: ext4
      reclaimPolicy: Delete
    longhornUI:
      replicas: 1
    ingress:
      enabled: false
