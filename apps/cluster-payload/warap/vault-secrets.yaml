---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: warap
spec:
  vaultConnectionRef:
    name: vault-connection
    namespace: vault-secrets-operator-system
  method: jwt
  mount: clusterpayload
  jwt:
    role: jwt-clusterpayload-warap-staging-warap
    serviceAccount: warap-vault-auth
    audiences:
      - warap
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: warap-db-secret
  namespace: warap
spec:
  vaultAuthRef: vault-auth
  mount: kv
  type: kv-v2
  path: warap/staging/clusterpayload/warap/warap-db-secret
  destination:
    name: warap-db-secret
    create: true
  refreshAfter: 30s
