---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: harbor
spec:
  vaultConnectionRef:
    name: vault-connection
    namespace: vault-secrets-operator-system
  method: jwt
  mount: clusterpayload
  jwt:
    role: jwt-clusterpayload-middleware-staging-harbor
    serviceAccount: harbor-vault-auth
    audiences:
      - middleware
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: harbor-secret
  namespace: harbor
spec:
  vaultAuthRef: vault-auth
  mount: kv
  type: kv-v2
  path: middleware/staging/clusterpayload/harbor/harbor-secret
  destination:
    name: harbor-secret
    create: true
  refreshAfter: 30s
