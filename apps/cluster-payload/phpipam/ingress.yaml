---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpipam
  namespace: phpipam
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: ipam.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phpipam-web
                port:
                  number: 80