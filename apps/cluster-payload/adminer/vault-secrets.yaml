---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: adminer
spec:
  vaultConnectionRef:
    name: vault-connection
    namespace: vault-secrets-operator-system
  method: jwt
  mount: clusterpayload
  jwt:
    role: jwt-clusterpayload-middleware-staging-adminer
    serviceAccount: adminer-vault-auth
    audiences:
      - middleware
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: adminer-basic-auth
  namespace: adminer
spec:
  vaultAuthRef: vault-auth
  mount: kv
  type: kv-v2
  path: middleware/staging/clusterpayload/adminer/adminer-basic-auth
  destination:
    name: adminer-basic-auth
    create: true
  refreshAfter: 30s
