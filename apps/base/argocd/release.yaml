---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 5m
  releaseName: argocd
  chart:
    spec:
      chart: argo-cd
      version: "9.4.14"
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 1m
  values:
    global:
      domain: argocd.homelab.local
    configs:
      params:
        server.insecure: true
    server:
      ingress:
        enabled: false
    redis-ha:
      enabled: false
    controller:
      replicas: 1
    repoServer:
      replicas: 1
    applicationSet:
      replicas: 1
