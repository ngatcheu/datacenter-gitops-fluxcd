---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 5m
  releaseName: gitlab
  timeout: 10m
  chart:
    spec:
      chart: gitlab
      version: "9.9.2"
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
      interval: 1m
  values:
    global:
      hosts:
        domain: homelab.local
        gitlab:
          name: gitlab.homelab.local
        https: true
      ingress:
        configureCertmanager: false
        class: nginx
        tls:
          enabled: false
    installCertmanager: false
    certmanager:
      installCRDs: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    gitlab-runner:
      install: false
