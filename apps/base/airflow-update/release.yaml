---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: airflow
spec:
  interval: 1h
  chart:
    spec:
      chart: airflow
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: apache-airflow
        namespace: flux-system
      interval: 1m
  timeout: 30m
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    airflowVersion: "3.1.7"
    defaultAirflowTag: "3.1.7"
    images:
      migrationsWaitTimeout: 500
    executor: KubernetesExecutor
    redis:
      enabled: false
    createUserJob:
      useHelmHooks: false
      applyCustomEnv: false
      defaultUser:
        role: Admin
        username: admin
        email: nsfabrice2009@gmail.com
        firstName: Admin
        lastName: User
        password: admin
    migrateDatabaseJob:
      useHelmHooks: false
      applyCustomEnv: false
    postgresql:
      enabled: true
      auth:
        username: airflow
        password: airflow
        database: airflow
      primary:
        persistence:
          enabled: true
          storageClass: longhorn-retain
          size: 5Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
    scheduler:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
    apiServer:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
    logs:
      persistence:
        enabled: true
        storageClassName: longhorn-retain
        size: 4Gi
    dags:
      persistence:
        enabled: true
        storageClassName: longhorn-retain
        size: 3Gi
    ingress:
      web:
        enabled: false
      apiServer:
        enabled: false
