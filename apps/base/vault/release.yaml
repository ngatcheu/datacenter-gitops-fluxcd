---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 5m
  releaseName: vault
  chart:
    spec:
      chart: vault
      version: "0.29.*"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 1m
  values:
    server:
      standalone:
        enabled: true
      dataStorage:
        enabled: true
        size: 5Gi
      affinity: ""
    ui:
      enabled: true
      serviceType: ClusterIP
    injector:
      enabled: false
