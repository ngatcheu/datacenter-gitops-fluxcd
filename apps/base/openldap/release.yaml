---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openldap
  namespace: openldap
spec:
  interval: 1h
  releaseName: openldap
  timeout: 10m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: ldap-stack
      version: "1.3.1"
      sourceRef:
        kind: HelmRepository
        name: ldap-stack
        namespace: flux-system
      interval: 1h
  values:
    global:
      storageClass: longhorn-retain

    openldap:
      enabled: true
      config:
        organisation: "Home Lab"
        domain: "homelab.local"
      existingSecret: "openldap-secret"
      secretKeys:
        adminPassword: "admin-password"
        configPassword: "config-password"
      tls:
        enabled: false
      persistence:
        enabled: true
        storageClass: longhorn-retain
        data:
          size: 2Gi
        config:
          size: 100Mi
      bootstrap:
        enabled: true
        createDefaultOUs: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    phpldapadmin:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    keycloak:
      enabled: false