---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 5m
  releaseName: harbor
  chart:
    spec:
      chart: harbor
      version: "1.18.3"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
      interval: 1h
  values:
    expose:
      type: clusterIP
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: wildcard-tls
      clusterIP:
        name: harbor
    externalURL: https://harbor.homelab.local
    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          size: 10GGi
        jobservice:
          jobLog:
            size: 1Gi
        database:
          size: 1Gi
        redis:
          size: 1Gi
        trivy:
          size: 5Gi
    harborAdminPassword: "Harbor12345"
