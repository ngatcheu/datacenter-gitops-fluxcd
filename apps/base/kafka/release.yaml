---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
  namespace: kafka
spec:
  interval: 1h
  releaseName: kafka
  timeout: 15m
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kafka
      version: "0.1.15"
      sourceRef:
        kind: HelmRepository
        name: kubelauncher
        namespace: flux-system
      interval: 1h
  values:
    replicaCount: 3

    podManagementPolicy: "Parallel"

    # KRaft — chaque node est broker + controller
    kraft:
      clusterId: ""
      processRoles: "broker,controller"
      controllerQuorumVoters: ""

    heapOpts: "-Xmx1g -Xms1g"

    # Utiliser un sous-repertoire pour eviter le conflit avec lost+found (ext4/Longhorn)
    logDirs: /data/kafka/logs

    persistence:
      enabled: true
      storageClass: longhorn-retain
      size: 10Gi
      mountPath: /data/kafka

    resources:
      requests:
        cpu: 250m
        memory: 1500Mi
      limits:
        cpu: 1000m
        memory: 2Gi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka-ui
  namespace: kafka
spec:
  interval: 1h
  releaseName: kafka-ui
  timeout: 5m
  dependsOn:
    - name: kafka
      namespace: kafka
  chart:
    spec:
      chart: kafka-ui
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: kubelauncher
        namespace: flux-system
      interval: 1h
  values:
    yamlApplicationConfig:
      kafka:
        clusters:
          - name: homelab
            bootstrapServers: kafka.kafka.svc.cluster.local:9092
      auth:
        type: disabled
      management:
        health:
          ldap:
            enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi